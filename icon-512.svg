<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1a0e"/>
      <stop offset="100%" style="stop-color:#4a2800"/>
    </linearGradient>
    <linearGradient id="piece" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8eedc"/>
      <stop offset="100%" style="stop-color:#e8d0a0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Board hint lines -->
  <rect x="20" y="20" width="152" height="152" rx="8" fill="#d4a96a" opacity="0.15"/>
  <!-- Shogi piece shape (pentagon) -->
  <polygon points="96,28 158,55 158,158 34,158 34,55" fill="url(#piece)" rx="8"/>
  <polygon points="96,28 158,55 158,158 34,158 34,55" fill="none" stroke="#b8924e" stroke-width="3"/>
  <!-- 将 kanji -->
  <text x="96" y="122" font-family="serif" font-size="72" font-weight="900" text-anchor="middle" fill="#2c1a0e">将</text>
  <!-- Gold accent line -->
  <line x1="34" y1="175" x2="158" y2="175" stroke="#c8a84b" stroke-width="3" stroke-linecap="round"/>
</svg>
